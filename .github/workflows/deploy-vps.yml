name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.USERNAME }}@${{ secrets.HOST }}" << 'EOF'
          set -euo pipefail

          PROJECT_DIR="${{ secrets.VPS_APP_DIR || '/var/www/hrm.sardarit.cloud' }}"
          BRANCH="${{ github.ref_name }}"
          WEB_USER="${{ secrets.WEB_USER || 'nginx' }}"
          WEB_GROUP="${{ secrets.WEB_GROUP || 'nginx' }}"
          PHP_BIN="${{ secrets.PHP_BIN || 'php' }}"
          COMPOSER_BIN="${{ secrets.COMPOSER_BIN || 'composer' }}"

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project directory not found: $PROJECT_DIR"
            exit 1
          fi

          echo "Deploying to $PROJECT_DIR"
          cd "$PROJECT_DIR"

          echo "Pull latest code"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          echo "Install PHP dependencies"
          export COMPOSER_ALLOW_SUPERUSER=1
          "$COMPOSER_BIN" install --no-interaction --prefer-dist --optimize-autoloader --no-dev

          if [ -f package-lock.json ]; then
            echo "Install/build frontend"
            npm ci
            npm run build
          fi

          echo "Laravel deploy steps"
          "$PHP_BIN" artisan migrate --force
          "$PHP_BIN" artisan optimize:clear
          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan route:cache
          "$PHP_BIN" artisan view:cache
          "$PHP_BIN" artisan storage:link || true

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          echo "Set permissions for nginx/php-fpm"
          $SUDO chown -R "$WEB_USER:$WEB_GROUP" storage bootstrap/cache
          $SUDO find storage bootstrap/cache -type d -exec chmod 775 {} +
          $SUDO find storage bootstrap/cache -type f -exec chmod 664 {} +

          if [ -d public/build ]; then
            $SUDO chown -R "$WEB_USER:$WEB_GROUP" public/build
            $SUDO find public/build -type d -exec chmod 755 {} +
            $SUDO find public/build -type f -exec chmod 644 {} +
          fi

          echo "Deployment complete"
          EOF
